name: "Build App"
description: "Set up runtime, install dependencies, run tests, produce coverage"

inputs:
  node-version:
    description: "Node.js version"
    required: false
    default: "20"
  working-directory:
    description: "Where to run the build"
    required: false
    default: "."

runs:
  using: "composite"
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'npm'
        cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json
    - name: Install
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: npm ci
    - name: Test
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: npm test
