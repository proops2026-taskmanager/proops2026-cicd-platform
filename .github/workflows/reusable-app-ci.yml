name: Reusable App CI

on:
  workflow_call:
    inputs:
      runtime-version:
        type: string
        default: "20"
      project-name:
        type: string
        required: true
      service-name:
        type: string
        required: true
      image-tag:
        type: string
        required: true
      push-image:
        type: boolean
        default: false
    secrets:
      REGISTRY_USERNAME:
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: app_user
          POSTGRES_PASSWORD: app_pass
          POSTGRES_DB: users_test_db
        ports: ['5433:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Create test env
        shell: bash
        run: |
          echo "DATABASE_URL=postgresql://app_user:app_pass@localhost:5433/users_test_db" >> .env.test
          echo "JWT_SECRET=test_secret_minimum_32_characters_long" >> .env.test
          echo "JWT_EXPIRES_IN=24h" >> .env.test
          echo "PORT=3001" >> .env.test
      - name: Build app
        uses: proops2026-taskmanager/proops2026-cicd-platform/.github/actions/build-app@v1
        # ^ relative path works when called from same repo OR when reusable workflow + action are in same platform repo
        with:
          node-version: ${{ inputs.runtime-version }}
      - name: Docker build + push
        uses: proops2026-taskmanager/proops2026-cicd-platform/.github/actions/docker-build-push@v1
        with:
          image-name: ${{ inputs.project-name }}/${{ inputs.service-name }}
          image-tag: ${{ inputs.image-tag }}
          push: ${{ inputs.push-image }}
          registry-username: ${{ github.actor }}
          registry-password: ${{ github.token }}